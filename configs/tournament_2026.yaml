# FIFA World Cup 2026 structure: 48 teams, 12 groups of 4.
# Advancement: top 2 of each group (24) + 8 best third-placed teams -> Round of 32.
# Then R32 -> R16 -> QF -> SF -> Final (single elimination).
#
# NOTE: team names below are PLACEHOLDERS — replace with the official draw.
# Names must match the `home_team`/`away_team` spelling in the martj42 results
# dataset so the model can resolve each team's Elo/form.

format:
  n_groups: 12
  teams_per_group: 4
  advance_top_n: 2          # group winners + runners-up
  best_thirds: 8            # best third-placed teams that also advance

points:                     # group-stage scoring
  win: 3
  draw: 1
  loss: 0

groups:
  A: ["Mexico", "Poland", "Saudi Arabia", "Uzbekistan"]
  B: ["Canada", "Belgium", "Egypt", "New Zealand"]
  C: ["United States", "Croatia", "Ecuador", "Qatar"]
  D: ["Argentina", "Norway", "Ivory Coast", "Jamaica"]
  E: ["France", "Senegal", "Japan", "Panama"]
  F: ["Brazil", "Switzerland", "Iran", "Honduras"]
  G: ["England", "Colombia", "South Korea", "Curacao"]
  H: ["Spain", "Uruguay", "Tunisia", "Jordan"]
  I: ["Portugal", "Turkey", "Australia", "Cape Verde"]
  J: ["Netherlands", "Morocco", "Nigeria", "Haiti"]
  K: ["Germany", "Denmark", "Ghana", "Costa Rica"]
  L: ["Italy", "Austria", "Algeria", "Paraguay"]

# Round of 32 bracket template. Slot tokens:
#   "1X" = winner of group X, "2X" = runner-up of group X,
#   "3rd-N" = the N-th ranked best third-placed team (1 = best).
# Simulate.py resolves these tokens after the group stage. This is a
# self-consistent template; swap pairings to match the official bracket.
round_of_32:
  - ["1A", "3rd-3"]
  - ["1C", "2F"]
  - ["1E", "3rd-1"]
  - ["1G", "2H"]
  - ["1I", "3rd-5"]
  - ["1K", "2L"]
  - ["1B", "3rd-7"]
  - ["1D", "2J"]
  - ["1F", "3rd-8"]
  - ["1H", "2K"]
  - ["1J", "3rd-6"]
  - ["1L", "2D"]
  - ["2A", "2C"]
  - ["2E", "2G"]
  - ["2I", "2B"]
  - ["3rd-2", "3rd-4"]
